<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Contact — Young Wave Creative</title>
<meta name="description" content="브랜드 제휴 문의. 영업일 2일 내 맞춤 제안서를 보내드립니다.">
<link rel="icon" href="assets/youngwave-logo.png">
<!-- Open Graph / 링크 미리보기 (영웨이브 로고) -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="Young Wave Creative">
<meta property="og:title" content="Young Wave Creative — 유럽·동남아 인플루언서 커머스 풀스택 컴퍼니">
<meta property="og:description" content="셀럽과 인플루언서 풀로 브랜드의 동남아·유럽 매출을 만듭니다.">
<meta property="og:url" content="https://youngwave.seoul.kr/">
<meta property="og:image" content="https://youngwave.seoul.kr/assets/og-image.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://youngwave.seoul.kr/assets/og-image.jpg">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body data-page="contact">
<div class="bg-aura"></div><div class="bg-grid"></div>
<header class="nav"></header>

<section class="sec wrap" style="padding-top:64px">
  <div class="sec-head reveal">
    <div class="kicker" data-i18n="cta.brand"></div>
    <h2 data-i18n="contact.title"></h2>
    <p data-i18n="contact.sub"></p>
  </div>

  <div class="grid-2" style="align-items:start;gap:30px">
    <form class="form-card reveal" id="inquiryForm">
      <div class="form-row">
        <div class="field"><label data-i18n="f.name"></label><input name="name" required data-i18n-ph="f.name"></div>
        <div class="field"><label data-i18n="f.company"></label><input name="company" required data-i18n-ph="f.company"></div>
      </div>
      <div class="field"><label data-i18n="f.email"></label><input type="email" name="email" required data-i18n-ph="f.email"></div>
      <div class="form-row">
        <div class="field"><label data-i18n="f.cat"></label>
          <select name="cat">
            <option value="" data-i18n="f.cat.ph"></option>
            <option value="cosmetic" data-i18n="f.cat.cosmetic"></option>
            <option value="food" data-i18n="f.cat.food"></option>
            <option value="living" data-i18n="f.cat.living"></option>
            <option value="game" data-i18n="f.cat.game"></option>
            <option value="device" data-i18n="f.cat.device"></option>
            <option value="etc" data-i18n="f.cat.etc"></option>
          </select></div>
        <div class="field"><label data-i18n="f.country"></label>
          <select name="country">
            <option value="vietnam">Vietnam</option>
            <option value="philippines">Philippines</option>
            <option value="thailand">Thailand</option>
            <option value="asean">ASEAN (All)</option>
          </select></div>
      </div>
      <div class="field"><label data-i18n="f.msg"></label><textarea name="msg" data-i18n-ph="f.msg"></textarea></div>
      <button type="submit" class="btn btn-y" style="width:100%;justify-content:center" data-i18n="f.send"></button>
      <p class="form-note" data-i18n="f.note"></p>
    </form>

    <div class="contact-aside reveal">
      <div class="ci"><div class="t" data-i18n="contact.email"></div>
        <div class="v">
          <div class="fc"><span class="fc-name">조영아 · Strella Young</span><span class="fc-role">영웨이브 본사 대표</span><a href="mailto:youngwavecreative@gmail.com">youngwavecreative@gmail.com</a></div>
          <div class="fc"><span class="fc-name">Duong Thi Huyen Tran</span><span class="fc-role">영웨이브 베트남 공동대표</span></div>
          <div class="fc"><span class="fc-name">Brooks Kim · 김현우</span><span class="fc-role">한국 지사 · Brooks Global 대표</span><a href="mailto:brooksservices.kim@gmail.com">brooksservices.kim@gmail.com</a></div>
          <div class="fc"><span class="fc-name">Jenny Go · 고은주</span><span class="fc-role">한국 지사 · Brooks Global Sales Director</span><a href="mailto:jinniko7490@naver.com">jinniko7490@naver.com</a></div>
        </div></div>
    </div>
  </div>
</section>

<footer></footer>
<script src="js/data.js"></script>
<script src="js/media.js"></script>
<script src="js/app.js"></script>
</body></html>
